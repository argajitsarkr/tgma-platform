{% extends "base.html" %}
{% block title %}Register Samples — TGMA Platform{% endblock %}
{% block content %}
<h1 class="page-title">Register Samples</h1>
<p class="page-subtitle">Register fecal and saliva samples for a participant.</p>

<div class="tgma-card" style="max-width:600px;">
    <form method="POST" action="{{ url_for('samples.register') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
            <label class="form-label fw-semibold">Participant</label>
            <select name="tracking_id" class="form-select" required>
                <option value="">Select participant...</option>
                {% for p in participants %}
                <option value="{{ p.tracking_id }}" {{ 'selected' if request.args.get('tracking_id') == p.tracking_id }}>
                    {{ p.tracking_id }} — {{ p.full_name }}
                </option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Sample Types</label>
            <div class="form-check mb-2">
                <input class="form-check-input" type="checkbox" name="sample_types" value="stool" id="st_stool" checked>
                <label class="form-check-label" for="st_stool">
                    <i class="bi bi-droplet-fill" style="color:var(--tgma-accent);"></i> Fecal Sample (STL) — for metagenomic sequencing
                </label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" name="sample_types" value="saliva_cortisol" id="st_cortisol" checked>
                <label class="form-check-label" for="st_cortisol">
                    <i class="bi bi-droplet-fill" style="color:var(--tgma-green-500);"></i> Saliva for Cortisol (COR) — cortisol analysis
                </label>
            </div>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-tgma"><i class="bi bi-plus-circle"></i> Register Samples</button>
            <a href="{{ url_for('samples.tracker') }}" class="btn btn-tgma-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
