version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tgma_db
      POSTGRES_USER: tgma_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me-strong-password}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tgma_user -d tgma_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://tgma_user:${DB_PASSWORD:-change-me-strong-password}@db:5432/tgma_db
      SECRET_KEY: ${SECRET_KEY:-change-me-to-random-string}
      UPLOAD_FOLDER: /data/uploads
    volumes:
      - uploads:/data/uploads
      - ./app/static:/app/app/static
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "${LAN_IP:-192.168.1.100}:443:443"
      - "${LAN_IP:-192.168.1.100}:80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./certs:/etc/nginx/certs
      - ./app/static:/var/www/static
    command: >
      sh -c "
        if [ ! -f /etc/nginx/certs/tgma.crt ]; then
          mkdir -p /etc/nginx/certs &&
          openssl req -x509 -nodes -days 365 -newkey rsa:2048
            -keyout /etc/nginx/certs/tgma.key
            -out /etc/nginx/certs/tgma.crt
            -subj '/CN=tgma-platform/O=Tripura University';
        fi &&
        nginx -g 'daemon off;'
      "

volumes:
  pgdata:
  uploads:
